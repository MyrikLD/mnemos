<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Memlord — Create account</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
               background: #f7f7f8; color: #111827; display: flex; align-items: center;
               justify-content: center; min-height: 100vh; -webkit-font-smoothing: antialiased; padding: 1.5rem; }
        .login-wrap { width: 100%; max-width: 380px; }
        .login-brand { display: flex; align-items: center; justify-content: center;
                       gap: 0.625rem; margin-bottom: 2rem; }
        .login-brand-icon { width: 36px; height: 36px;
            background: linear-gradient(135deg, #818cf8 0%, #6366f1 100%);
            border-radius: 10px; display: flex; align-items: center; justify-content: center;
            color: #fff; font-size: 1rem; font-weight: 700; line-height: 1; }
        .login-brand-name { font-size: 1.25rem; font-weight: 700; color: #111827; letter-spacing: -0.025em; }
        .login-card { background: #fff; border: 1px solid #e5e7eb; border-radius: 14px;
            padding: 2rem; box-shadow: 0 4px 6px -1px rgba(0,0,0,.06), 0 2px 4px -2px rgba(0,0,0,.04); }
        .login-heading { font-size: 1rem; font-weight: 600; color: #111827; margin-bottom: 0.375rem; }
        .login-subheading { font-size: 0.8125rem; color: #9ca3af; margin-bottom: 1.5rem; }
        .form-group { margin-bottom: 1rem; }
        label { display: block; font-size: 0.8125rem; font-weight: 500; color: #374151; margin-bottom: 0.375rem; }
        input[type="email"], input[type="password"], input[type="text"] {
            width: 100%; padding: 0.5625rem 0.75rem; border: 1px solid #e5e7eb;
            border-radius: 6px; color: #111827; font-size: 0.875rem; font-family: inherit;
            background: #fff; outline: none; transition: border-color .15s, box-shadow .15s; }
        input:focus { border-color: #a5b4fc; box-shadow: 0 0 0 3px rgba(99,102,241,.1); }
        .btn-submit { width: 100%; margin-top: 0.25rem; padding: 0.625rem;
            background: #6366f1; border: 1px solid #6366f1; border-radius: 6px;
            color: #fff; font-size: 0.875rem; font-family: inherit; font-weight: 500;
            cursor: pointer; transition: background .12s, border-color .12s; }
        .btn-submit:hover { background: #4f46e5; border-color: #4f46e5; }
        .error { display: flex; align-items: center; gap: 0.5rem; margin-top: 0.875rem;
            padding: 0.625rem 0.875rem; background: #fef2f2; border: 1px solid #fecaca;
            border-radius: 6px; color: #dc2626; font-size: 0.8125rem; }
        .signin-link { margin-top: 1rem; text-align: center; font-size: 0.8125rem; color: #6b7280; }
        .signin-link a { color: #6366f1; text-decoration: none; font-weight: 500; }
        .signin-link a:hover { text-decoration: underline; }
    </style>
</head>
<body>
<div class="login-wrap">
    <div class="login-brand">
        <div class="login-brand-icon">M</div>
        <span class="login-brand-name">Memlord</span>
    </div>
    <div class="login-card">
        <div class="login-heading">Create account</div>
        <div class="login-subheading">Fill in the details below to get started.</div>
        <form method="post" action="/ui/register">
            <input type="hidden" name="next" value="{{ next }}">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" autofocus required
                       autocomplete="email" value="{{ email or '' }}">
            </div>
            <div class="form-group">
                <label for="display_name">Display name</label>
                <input type="text" id="display_name" name="display_name" required
                       autocomplete="name" value="{{ display_name or '' }}">
            </div>
            <div class="form-group">
                <label for="pw">Password</label>
                <input type="password" id="pw" name="password" required
                       autocomplete="new-password">
            </div>
            <div class="form-group">
                <label for="pw2">Confirm password</label>
                <input type="password" id="pw2" name="password2" required
                       autocomplete="new-password">
            </div>
            <button type="submit" class="btn-submit">Create account</button>
            {% if error %}<p class="error">{{ error }}</p>{% endif %}
        </form>
        <p class="signin-link">Already have an account? <a href="/ui/login?next={{ next }}">Sign in</a></p>
    </div>
</div>
</body>
</html>
