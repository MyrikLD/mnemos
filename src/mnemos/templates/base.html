<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Mnemos{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: { extend: { fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] } } }
        }
    </script>
    <script src="https://unpkg.com/htmx.org@2.0.3/dist/htmx.min.js" defer></script>
</head>
<body class="bg-gray-50 text-gray-900 antialiased font-sans min-h-screen">

<nav class="bg-zinc-900 border-b border-zinc-800 sticky top-0 z-50">
    <div class="max-w-5xl mx-auto px-4 sm:px-6 flex items-center gap-3 h-[52px]">
        <a href="/" class="flex items-center gap-2 text-white font-bold text-[15px] tracking-tight shrink-0 hover:opacity-80 transition-opacity" style="text-decoration:none">
            <span class="w-[26px] h-[26px] bg-gradient-to-br from-indigo-400 to-indigo-600 rounded-[7px] flex items-center justify-center text-[11px] font-bold text-white">M</span>
            Mnemos
        </a>
        <div class="w-px h-5 bg-zinc-700 shrink-0 hidden sm:block"></div>
        <form action="/search" method="get" class="flex-1 flex gap-2 max-w-lg">
            <input name="q" placeholder="Search memories…" value="{{ q | default('') }}"
                   autocomplete="off"
                   class="flex-1 min-w-0 px-3 py-1.5 bg-zinc-800 border border-zinc-700 rounded-lg text-zinc-200 text-[13px] placeholder-zinc-500 focus:outline-none focus:border-indigo-500 transition-colors">
            <button type="submit"
                    class="px-3.5 py-1.5 bg-indigo-500 hover:bg-indigo-600 text-white text-[13px] font-medium rounded-lg transition-colors shrink-0 border-0 cursor-pointer">
                Search
            </button>
        </form>
        {% if username is defined and username %}
        <div class="w-px h-5 bg-zinc-700 shrink-0 hidden sm:block"></div>
        <a href="/ui/workspace" class="text-zinc-400 hover:text-zinc-100 text-[13px] transition-colors whitespace-nowrap" style="text-decoration:none">{{ username }}</a>
        <a href="/ui/logout" class="text-zinc-600 hover:text-zinc-400 text-[13px] transition-colors whitespace-nowrap" style="text-decoration:none">Sign out</a>
        {% endif %}
    </div>
</nav>

<main class="max-w-5xl mx-auto px-4 sm:px-6 py-8">
    {% block content %}{% endblock %}
</main>

</body>
</html>
