<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Mnemos{% endblock %}</title>
  <script src="https://unpkg.com/htmx.org@2.0.3/dist/htmx.min.js" defer></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f4f4f5;
      color: #18181b;
      line-height: 1.5;
    }
    a { color: #4f46e5; text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* nav */
    nav {
      background: #18181b;
      color: #e4e4e7;
      padding: 0.75rem 0;
      border-bottom: 1px solid #3f3f46;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .nav-inner {
      max-width: 1000px;
      margin: 0 auto;
      padding: 0 1.25rem;
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    .nav-brand {
      font-size: 1.125rem;
      font-weight: 700;
      color: #e4e4e7;
      letter-spacing: -0.02em;
      white-space: nowrap;
    }
    .nav-brand:hover { text-decoration: none; color: #fff; }
    .search-form {
      flex: 1;
      max-width: 520px;
      display: flex;
      gap: 0.5rem;
    }
    .search-input {
      flex: 1;
      padding: 0.375rem 0.75rem;
      border: 1px solid #52525b;
      border-radius: 6px;
      background: #27272a;
      color: #e4e4e7;
      font-size: 0.875rem;
    }
    .search-input::placeholder { color: #71717a; }
    .search-input:focus { outline: none; border-color: #818cf8; }
    .btn-search {
      padding: 0.375rem 0.875rem;
      background: #4f46e5;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 0.875rem;
      cursor: pointer;
      font-weight: 500;
      white-space: nowrap;
    }
    .btn-search:hover { background: #4338ca; }

    /* layout */
    main {
      max-width: 1000px;
      margin: 0 auto;
      padding: 1.5rem 1.25rem;
    }

    /* cards */
    .card {
      background: #fff;
      border: 1px solid #e4e4e7;
      border-radius: 10px;
      padding: 1.25rem;
      margin-bottom: 0.75rem;
    }
    .card:hover { border-color: #c7d2fe; }
    .card-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 1rem;
    }
    .card-content {
      font-size: 0.9375rem;
      color: #3f3f46;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
      overflow: hidden;
    }
    .card-meta {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-top: 0.75rem;
      flex-wrap: wrap;
    }
    .card-date { font-size: 0.75rem; color: #a1a1aa; margin-left: auto; }

    /* badges & tags */
    .badge {
      display: inline-block;
      padding: 0.125rem 0.5rem;
      border-radius: 99px;
      font-size: 0.75rem;
      font-weight: 500;
    }
    .badge-type { background: #ede9fe; color: #5b21b6; }
    .tag {
      display: inline-block;
      padding: 0.125rem 0.5rem;
      border-radius: 99px;
      background: #f1f5f9;
      color: #475569;
      font-size: 0.75rem;
    }

    /* buttons */
    .btn {
      display: inline-block;
      padding: 0.375rem 0.75rem;
      border: none;
      border-radius: 6px;
      font-size: 0.8125rem;
      cursor: pointer;
      font-weight: 500;
      line-height: 1.5;
      text-decoration: none;
    }
    .btn:hover { text-decoration: none; }
    .btn-sm { padding: 0.25rem 0.625rem; font-size: 0.75rem; }
    .btn-ghost {
      background: transparent;
      color: #52525b;
      border: 1px solid #e4e4e7;
    }
    .btn-ghost:hover { background: #f4f4f5; color: #18181b; }
    .btn-primary-sm {
      background: #4f46e5;
      color: #fff;
      border: none;
      padding: 0.375rem 0.875rem;
      border-radius: 6px;
      font-size: 0.875rem;
      font-weight: 500;
      cursor: pointer;
    }
    .btn-primary-sm:hover { background: #4338ca; }
    .btn-danger {
      background: #fef2f2;
      color: #dc2626;
      border: 1px solid #fecaca;
    }
    .btn-danger:hover { background: #fee2e2; }

    /* pagination */
    .pagination {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-top: 1.25rem;
      justify-content: center;
    }
    .page-info { font-size: 0.875rem; color: #71717a; }

    /* filters */
    .filters {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 1rem;
      flex-wrap: wrap;
    }
    .filter-input {
      padding: 0.375rem 0.75rem;
      border: 1px solid #e4e4e7;
      border-radius: 6px;
      font-size: 0.875rem;
      background: #fff;
      color: #374151;
    }
    .filter-input:focus { outline: none; border-color: #818cf8; }
    .info-line { font-size: 0.875rem; color: #71717a; margin-bottom: 0.875rem; }

    /* form */
    .form-group { margin-bottom: 1rem; }
    .form-label {
      display: block;
      font-size: 0.8125rem;
      font-weight: 500;
      color: #374151;
      margin-bottom: 0.375rem;
    }
    .form-hint { font-size: 0.75rem; color: #9ca3af; font-weight: 400; }
    .form-input, .form-textarea {
      width: 100%;
      padding: 0.5rem 0.75rem;
      border: 1px solid #e4e4e7;
      border-radius: 6px;
      font-size: 0.875rem;
      color: #374151;
      background: #fff;
      font-family: inherit;
    }
    .form-input:focus, .form-textarea:focus {
      outline: none;
      border-color: #818cf8;
      box-shadow: 0 0 0 3px rgba(129,140,248,.1);
    }
    .form-textarea { resize: vertical; min-height: 120px; }
    .form-mono { font-family: 'Menlo', 'Consolas', 'Monaco', monospace; font-size: 0.8125rem; }
    .form-actions { display: flex; gap: 0.75rem; align-items: center; flex-wrap: wrap; }

    /* alerts */
    .alert {
      padding: 0.75rem 1rem;
      border-radius: 8px;
      font-size: 0.875rem;
      margin-bottom: 1rem;
    }
    .alert-success { background: #f0fdf4; border: 1px solid #86efac; color: #166534; }
    .alert-error { background: #fef2f2; border: 1px solid #fca5a5; color: #991b1b; }

    /* detail */
    .detail-card { background: #fff; border: 1px solid #e4e4e7; border-radius: 10px; padding: 1.5rem; margin-bottom: 1rem; }
    .detail-label {
      font-size: 0.6875rem;
      font-weight: 600;
      color: #9ca3af;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      margin-bottom: 0.5rem;
    }
    .detail-content {
      font-size: 0.9375rem;
      color: #374151;
      white-space: pre-wrap;
      word-break: break-word;
      line-height: 1.7;
    }
    .detail-meta { display: flex; align-items: center; gap: 0.5rem; margin-top: 1rem; flex-wrap: wrap; }
    pre.meta-json {
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 6px;
      padding: 0.875rem;
      font-size: 0.8125rem;
      font-family: 'Menlo', 'Consolas', 'Monaco', monospace;
      overflow-x: auto;
      white-space: pre-wrap;
      word-break: break-word;
    }

    hr { border: none; border-top: 1px solid #e4e4e7; margin: 1.5rem 0; }
    .section-title { font-size: 0.9375rem; font-weight: 600; color: #374151; margin-bottom: 1rem; }
    .empty-state { text-align: center; padding: 3rem 1rem; color: #a1a1aa; }
    .breadcrumb { margin-bottom: 1rem; }
  </style>
</head>
<body>
<nav>
  <div class="nav-inner">
    <a href="/" class="nav-brand">Mnemos</a>
    <form action="/search" method="get" class="search-form">
      <input class="search-input" name="q" placeholder="Search memories…"
             value="{{ q | default('') }}" autocomplete="off">
      <button type="submit" class="btn-search">Search</button>
    </form>
  </div>
</nav>
<main>
  {% block content %}{% endblock %}
</main>
</body>
</html>
