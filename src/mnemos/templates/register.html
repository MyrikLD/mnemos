<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Mnemos — Create account</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { theme: { extend: { fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] } } } }</script>
</head>
<body class="bg-gray-50 font-sans antialiased min-h-screen flex items-center justify-center p-6">

<div class="w-full max-w-[380px]">
    <!-- Brand -->
    <div class="flex items-center justify-center gap-2.5 mb-8">
        <span class="w-9 h-9 bg-gradient-to-br from-indigo-400 to-indigo-600 rounded-[10px] flex items-center justify-center text-white font-bold text-base">M</span>
        <span class="text-xl font-bold text-gray-900 tracking-tight">Mnemos</span>
    </div>

    <!-- Card -->
    <div class="bg-white border border-gray-200 rounded-2xl p-8 shadow-sm">
        <h1 class="text-[16px] font-semibold text-gray-900 mb-1">Create account</h1>
        <p class="text-[13px] text-gray-400 mb-6">
            {% if invite %}Join a workspace by registering below.{% else %}Sign up for a new workspace.{% endif %}
        </p>

        <form method="post" action="/ui/register">
            <input type="hidden" name="invite" value="{{ invite }}">

            <div class="mb-4">
                <label class="block text-[13px] font-medium text-gray-600 mb-1.5" for="un">Username</label>
                <input type="text" id="un" name="username" autofocus required autocomplete="username"
                       class="w-full px-3 py-2.5 border border-gray-200 rounded-lg text-[14px] text-gray-900 bg-white focus:outline-none focus:border-indigo-400 focus:ring-2 focus:ring-indigo-500/10 transition-all">
            </div>
            <div class="mb-4">
                <label class="block text-[13px] font-medium text-gray-600 mb-1.5" for="pw">Password</label>
                <input type="password" id="pw" name="password" required autocomplete="new-password"
                       class="w-full px-3 py-2.5 border border-gray-200 rounded-lg text-[14px] text-gray-900 bg-white focus:outline-none focus:border-indigo-400 focus:ring-2 focus:ring-indigo-500/10 transition-all">
            </div>
            <div class="mb-5">
                <label class="block text-[13px] font-medium text-gray-600 mb-1.5" for="pw2">Confirm password</label>
                <input type="password" id="pw2" name="confirm" required autocomplete="new-password"
                       class="w-full px-3 py-2.5 border border-gray-200 rounded-lg text-[14px] text-gray-900 bg-white focus:outline-none focus:border-indigo-400 focus:ring-2 focus:ring-indigo-500/10 transition-all">
            </div>

            <button type="submit"
                    class="w-full py-2.5 bg-indigo-500 hover:bg-indigo-600 text-white text-[14px] font-medium rounded-lg transition-colors border-0 cursor-pointer">
                Create account
            </button>

            {% if error %}
            <div class="flex items-center gap-2 mt-4 px-3.5 py-2.5 bg-red-50 border border-red-200 text-red-700 text-[13px] rounded-lg">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
                {{ error }}
            </div>
            {% endif %}
        </form>
    </div>

    <p class="text-center text-[13px] text-gray-500 mt-4">
        Already have an account?
        <a href="/ui/login{% if invite %}?invite={{ invite }}{% endif %}" class="text-indigo-500 hover:text-indigo-600 font-medium" style="text-decoration:none">Sign in</a>
    </p>
</div>

</body>
</html>
